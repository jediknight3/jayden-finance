<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JAYDEN FINANCE</title>
<style>
/* ═══════════════════════════════════════════
   JAYDEN FINANCE — 토스 스타일 디자인 시스템
   ═══════════════════════════════════════════ */
:root {
  /* 토스 컬러 팔레트 */
  --primary:   #3182F6;
  --primary-l: #EBF3FF;
  --green:     #05C072;
  --green-l:   #E8FAF3;
  --red:       #F04452;
  --red-l:     #FFF0F1;
  --orange:    #FF6B00;
  --orange-l:  #FFF3E8;
  --purple:    #7B61FF;
  --purple-l:  #F0EEFF;
  --yellow:    #FFBE00;
  --yellow-l:  #FFFBE6;

  /* 그레이 스케일 */
  --gray-900: #191F28;
  --gray-800: #333D4B;
  --gray-700: #4E5968;
  --gray-600: #6B7684;
  --gray-500: #8B95A1;
  --gray-400: #B0B8C1;
  --gray-300: #D1D6DB;
  --gray-200: #E5E8EB;
  --gray-100: #F2F4F6;
  --gray-50:  #F8F9FA;
  --white:    #FFFFFF;

  /* 시맨틱 */
  --bg:       #F2F4F6;
  --card:     #FFFFFF;
  --text:     #191F28;
  --sub:      #6B7684;
  --border:   #E5E8EB;
  --radius-s: 8px;
  --radius-m: 12px;
  --radius-l: 16px;
  --radius-xl:20px;
  --shadow-s: 0 1px 4px rgba(0,0,0,.06);
  --shadow-m: 0 2px 12px rgba(0,0,0,.08);
  --shadow-l: 0 4px 24px rgba(0,0,0,.10);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── 헤더 ── */
.hdr {
  background: var(--white);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid var(--gray-200);
}
.hdr-logo { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-sync { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--gray-100); color: var(--gray-600); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.hdr-sync:active { background: var(--gray-200); }
.sync-badge { font-size: 11px; font-weight: 700; background: var(--primary); color: #fff; padding: 4px 10px; border-radius: 20px; }

/* 데스크탑에서 헤더 햄버거 숨김 (사이드바 있으므로) */
@media (min-width: 1024px) { #hdr-hamburger { display: none !important; } }

/* ── 딤 오버레이 ── */
#nav-dim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 340; display: none; opacity: 0;
  transition: opacity .25s;
}
#nav-dim.show { display: block; opacity: 1; }
